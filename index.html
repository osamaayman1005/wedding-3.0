    <style>
      /* Full-page preloader overlay */
      .preloader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #F4F1E8;
        z-index: 99999;
        transition: opacity 500ms ease, visibility 500ms ease;
        opacity: 1;
        visibility: visible;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      .preloader__logo {
        width: 140px;
        height: auto;
        display: block;
        transform-origin: center center;
        animation: preloader-breathe 3.5s ease-in-out infinite;
        will-change: transform;
      }

      @keyframes preloader-breathe {
        0% { transform: scale(0.85); }
        50% { transform: scale(1.15); }
        100% { transform: scale(0.85); }
      }

      .preloader--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
    </style>
  </head>
  <body class="paper-bg">
    <div id="root"></div>

    <!-- Preloader overlay (visible immediately) -->
    <div id="preloader" class="preloader" aria-hidden="false">
      <img src="/logo-light.svg" alt="" class="preloader__logo" draggable="false" aria-hidden="true" />
    </div>

    <script>
      (function () {
        var overlay = document.getElementById('preloader');
        if (!overlay) return;
        var MIN_VISIBLE_MS = 700;
        var startTime = performance.now ? performance.now() : Date.now();
        var finished = false;

        function finish() {
          if (finished) return;
          finished = true;
          overlay.classList.add('preloader--hide');
          overlay.setAttribute('aria-hidden', 'true');
          overlay.addEventListener('transitionend', function () {
            try { overlay.parentNode && overlay.parentNode.removeChild(overlay); } catch (e) {}
          });
        }

        var elapsed = (performance.now ? performance.now() : Date.now()) - startTime;
        var remaining = Math.max(0, MIN_VISIBLE_MS - elapsed);
        setTimeout(finish, remaining);

        // Safety timeout: ensure overlay doesn't hang forever (20s)
        setTimeout(function () {
          finish();
        }, 20000);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
